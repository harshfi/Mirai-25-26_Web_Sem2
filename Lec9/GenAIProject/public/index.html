<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Q&A UI</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f5f5f5;
      display: flex;
      flex-direction: column;
      height: 100vh;
    }

    /* Response area */
    .response-container {
      flex: 1;
      padding: 20px;
      overflow-y: auto;
    }

    .response-box {
      background: white;
      padding: 15px;
      border-radius: 10px;
      margin-bottom: 10px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    }

    /* Input area */
    .input-container {
      display: flex;
      gap: 10px;
      padding: 15px;
      background: #ffffff;
      border-top: 1px solid #ddd;
    }
    .questions{
        display: flex;
        gap: 10px;
        padding: 15px;
        background: #ffffff;
        border-top: 1px solid #ddd;
       
    }
    textarea {
      flex: 1;
      resize: none;
      padding: 10px;
      border-radius: 10px;
      border: 1px solid #ccc;
      font-size: 14px;
      outline: none;
    }

    textarea:focus {
      border-color: #4a90e2;
    }

    button {
      padding: 10px 16px;
      border: none;
      background: #4a90e2;
      color: white;
      font-size: 14px;
      border-radius: 10px;
      cursor: pointer;
    }

    button:hover {
      background: #357abd;
    }
  </style>
</head>
<body>
  <div class="questions">
   <!-- <div></div> -->
  </div>
  <!-- Response Section -->
  <div class="response-container">
    <div class="response-box">
      <strong>Response:</strong>
      <p></p>
    </div>
  </div>

  <!-- Input Section -->
  <div class="chat-container">
    <textarea placeholder="Ask your question..."></textarea>
    <button>Send</button>
  </div>
<script src="script.js"></script>
<script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>

</body>
</html>
