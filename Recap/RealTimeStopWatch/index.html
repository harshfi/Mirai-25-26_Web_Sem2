<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        h1{
            text-align: center;
        }
        .watch{
            text-align: center;
            margin: auto;
            font-size: 50px;
            border: 2px solid black;
            width: 300px

        }
        button{
            display: block;
            margin: auto;
            margin-top: 20px;
            padding: 10px 20px;
            font-size: 20px;
            background-color: aqua;
            border-radius: 20px;
            width: 200px;
        }
    </style>
</head>
<body>
    <h1>Real Time Stop Watch</h1>
      <h2 class="watch"><span class="hr">00</span>:<span class="min">00</span>:<span class="sec">00</span></h2>
    
      <button id="btn">Start</button>

      <script src="script.js"></script>
    </body>
</html>
